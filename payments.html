<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Video Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="payments.css">
</head>
<body>

    <header class="topbar">
        <nav>
            <a href="index.html">Home</a>
            <a href="https://ytjobs.co/talent/vitrine/437788" target="_blank">Portfolio</a>
            <a href="contact.html">Contact</a>
            <a href="payments.html">Payments</a>
        </nav>
    </header>

    <main class="payments-page">
        <div class="diagonal-bg-payments"></div>

        <div class="payments-container">
            <h1 class="payments-title fade-in-up">Payment Methods</h1>
            <p class="payments-subtitle fade-in-up delay-1"></p>
            
            <div class="payments-grid fade-in-up delay-2">
                
                <div class="payment-card promo-card">
                    <span class="promo-badge">discount</span>
                    <img src="icons/mercadolibre.webp" alt="Mercado Pago" class="payment-icon">
                    <h3 class="payment-name">Mercado Pago</h3>
                    <p class="payment-discount">10% discount for Argentines</p>
                </div>

                <div class="payment-card">
                    <img src="icons/paypal.webp" alt="PayPal" class="payment-icon">
                    <h3 class="payment-name">PayPal</h3>
                </div>

                <div class="payment-card">
                    <img src="icons/payooner.webp" alt="Payoneer" class="payment-icon">
                    <h3 class="payment-name">Payoneer</h3>
                </div>

                <div class="payment-card">
                    <img src="icons/binance.webp" alt="Binance" class="payment-icon">
                    <h3 class="payment-name">Binance Pay</h3>
                </div>

                <div class="payment-card">
                    <img src="icons/dolarapp.png" alt="DolarApp" class="payment-icon">
                    <h3 class="payment-name">DolarApp</h3>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
